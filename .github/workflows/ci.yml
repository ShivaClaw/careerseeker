name: CI

on:
  push:
    branches:
      - main
      - agent/**
      - codex/**
      - claude/**
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: true

jobs:
  build-and-test:
    name: Build and offline harnesses
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore CareerSeeker.sln

      - name: Build Release with warnings as errors
        run: dotnet build CareerSeeker.sln -c Release --no-restore --warnaserror

      - name: Run offline alpha verification
        shell: pwsh
        run: ./scripts/Verify-Alpha.ps1
